version: "3.9"

services:

  qdrant:
    image: qdrant/qdrant:v1.12.1
    container_name: akwa_qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      QDRANT__SERVICE__HTTP_PORT: 6333
      QDRANT__LOG_LEVEL: INFO
    networks:
      - internal       # réseau interne rag (qdrant n'a pas besoin d'être vu par l'orchestrateur)
    healthcheck:
      test: ["CMD-SHELL", "timeout 5 bash -c 'echo > /dev/tcp/localhost/6333' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:7.4-alpine
    container_name: akwa_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --save 60 1 --loglevel warning
    networks:
      - internal
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  rag_agent:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: akwa_rag_agent
    restart: unless-stopped
    ports:
      - "8005:8005"
    volumes:
      - huggingface_cache:/root/.cache/huggingface
    environment:
      OLLAMA_BASE_URL:         ${OLLAMA_BASE_URL}
      RAG_LLM_MODEL:           "qwen3:8b"
      CF_ACCESS_CLIENT_ID: "2c8ae98fc22cfe99e9fcc87fc7fab058.access"
      CF_ACCESS_CLIENT_SECRET: "4093f9711287f919fd0855a4f9d383bcdceda22599751fe1e32de33df1a207a7"
      EMBED_MODEL: "BAAI/bge-small-en-v1.5"
      EMBED_VECTOR_SIZE: "384"
      QDRANT_HOST:             "qdrant"       # nom du container sur réseau internal
      QDRANT_PORT:             "6333"
      REDIS_HOST:              "redis"        # nom du container sur réseau internal
      REDIS_PORT:              "6379"
      API_PORT:                "8005"
      ADMIN_API_KEY:           "akwa_admin_secret_2025"
      LOG_LEVEL:               "INFO"
      VISION_ENABLED:          "true"
      VISION_MODEL:            "qwen2.5vl"
      VISION_MIN_IMAGE_BYTES:  "5000"
      VISION_TIMEOUT:          "120"
    networks:
      - internal    
      - akwa_net   
    depends_on:
      qdrant:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c",
            "import httpx; r=httpx.get('http://localhost:8005/health', timeout=5); r.raise_for_status()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  qdrant_data:
    driver: local
  redis_data:
    driver: local
  huggingface_cache:
    driver: local

networks:
  internal:
    driver: bridge          # réseau privé rag stack
  akwa_net:
    external: true          # ← réseau partagé créé avec docker network create akwa_net