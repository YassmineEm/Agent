<div class="border border-gray-300 rounded-lg p-4 bg-gray-50 mb-4 sql-connection-row">
    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-2">
                Connection Name <span class="text-red-500">*</span>
            </label>
            <input
                type="text"
                name="sql_connection_name[]"
                class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
                placeholder="ex: flight_db_01"
                required
            >
        </div>
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-2">
                Database Name <span class="text-red-500">*</span>
            </label>
            <input
                type="text"
                name="sql_db_name[]"
                class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
                placeholder="ex: Global Flight Operations"
                required
            >
        </div>
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-2">
                Database Type <span class="text-red-500">*</span>
            </label>
            <select
                name="sql_db_type[]"
                class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
                required
            >
                <option value="">-- Sélectionner --</option>
                <option value="postgresql">PostgreSQL</option>
                <option value="mysql">MySQL</option>
                <option value="sqlite">SQLite</option>
                <option value="mssql">Microsoft SQL Server</option>
                <option value="oracle">Oracle</option>
            </select>
        </div>
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-2">
                Connection String <span class="text-red-500">*</span>
            </label>
            <input
                type="text"
                name="sql_connection_string[]"
                class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 font-mono text-sm"
                placeholder="ex: sqlite:///database/flight.sqlite"
                required
            >
            <p class="mt-1 text-xs text-gray-500">Format: <code>postgresql://user:pass@host/dbname</code></p>
        </div>
    </div>
    <div class="mt-3 flex items-center justify-between">
        <div class="flex items-center">
            <input
                type="checkbox"
                name="sql_is_active[]"
                value="on"
                checked
                class="w-4 h-4 text-blue-600 rounded focus:ring-blue-500"
            >
            <label class="ml-2 text-sm text-gray-700">Active</label>
        </div>
        <button
            type="button"
            onclick="this.closest('.sql-connection-row').remove()"
            class="inline-flex items-center px-3 py-1.5 text-sm text-red-600 hover:text-red-800 hover:bg-red-50 rounded-lg transition-colors"
        >
            <i class="fas fa-trash mr-1"></i>Supprimer
        </button>
    </div>
</div>
