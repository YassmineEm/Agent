<div class="border border-gray-300 rounded-lg p-4 bg-gray-50 mb-4">
    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-2">Connection Name</label>
            <input type="text" name="sql_connection_name[]" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500" placeholder="flight_db_01">
        </div>
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-2">Database Name</label>
            <input type="text" name="sql_db_name[]" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500" placeholder="Global Flight Operations">
        </div>
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-2">Database Type</label>
            <select name="sql_db_type[]" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500">
                <option value="">---------</option>
                <option value="postgresql">PostgreSQL</option>
                <option value="mysql">MySQL</option>
                <option value="sqlite">SQLite</option>
                <option value="mssql">Microsoft SQL Server</option>
                <option value="oracle">Oracle</option>
            </select>
        </div>
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-2">LLM</label>
            <select name="sql_llm[]" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500">
                <option value="">---------</option>
                <option value="qwen3:8b">Qwen3:8b</option>
                <option value="qwen2.5:7b">Qwen2.5:7b</option>
                <option value="Qwen/Qwen2.5-7B-Instruct">Qwen/Qwen2.5-7B-Instruct</option>
                <option value="Qwen/Qwen3-Coder-32B-Instruct">Qwen/Qwen3-Coder-32B-Instruct</option>
                <option value="gemma3">Gemma3</option>
                <option value="phi4">Phi4</option>
                <option value="llama3.2:3b">Llama 3.2 3B</option>
            </select>
        </div>
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-2">Connection String</label>
            <input type="password" name="sql_connection_string[]" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 font-mono text-sm" placeholder="sqlite:///database/flight.sqlite">
        </div>
    </div>
    <div class="mt-3 flex items-center justify-between">
        <div class="flex items-center">
            <input type="checkbox" name="sql_is_active[]" checked class="w-4 h-4 text-blue-600 rounded focus:ring-blue-500">
            <label class="ml-2 text-sm text-gray-700">Active</label>
        </div>
        <button type="button" onclick="this.parentElement.parentElement.remove()" class="text-red-600 hover:text-red-800 text-sm">
            <i class="fas fa-trash mr-1"></i>Remove
        </button>
    </div>
</div>
