<div class="border border-gray-300 rounded-lg p-4 bg-gray-50 mb-4">
    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-2">Action Name</label>
            <input type="text" name="action_name[]" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-orange-500" placeholder="Action name">
        </div>
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-2">HTTP Method</label>
            <select name="action_method[]" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-orange-500">
                <option value="GET">GET</option>
                <option value="POST" selected>POST</option>
                <option value="PUT">PUT</option>
                <option value="DELETE">DELETE</option>
                <option value="PATCH">PATCH</option>
            </select>
        </div>
        <div class="md:col-span-2">
            <label class="block text-sm font-medium text-gray-700 mb-2">API Endpoint</label>
            <input type="url" name="action_endpoint[]" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-orange-500" placeholder="https://api.example.com/endpoint">
        </div>
        <div class="md:col-span-2">
            <label class="block text-sm font-medium text-gray-700 mb-2">Description</label>
            <textarea name="action_description[]" rows="2" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-orange-500" placeholder="What does this action do?"></textarea>
        </div>
        <div class="md:col-span-2">
            <label class="block text-sm font-medium text-gray-700 mb-2">Headers (JSON)</label>
            <textarea name="action_headers[]" rows="3" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-orange-500 font-mono text-sm" placeholder='{"Authorization": "Bearer token", "Content-Type": "application/json"}'></textarea>
        </div>
        <div class="md:col-span-2">
            <label class="block text-sm font-medium text-gray-700 mb-2">Payload Template (JSON)</label>
            <textarea name="action_payload[]" rows="4" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-orange-500 font-mono text-sm" placeholder='{"key": "value"}'></textarea>
        </div>
    </div>
    <div class="mt-3 flex items-center justify-between">
        <div class="flex items-center">
            <input type="checkbox" name="action_is_active[]" checked class="w-4 h-4 text-orange-600 rounded focus:ring-orange-500">
            <label class="ml-2 text-sm text-gray-700">Active</label>
        </div>
        <button type="button" onclick="this.parentElement.parentElement.remove()" class="text-red-600 hover:text-red-800 text-sm">
            <i class="fas fa-trash mr-1"></i>Remove
        </button>
    </div>
</div>
