<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agent List</title>
    <link href="{% static 'css/styles.css' %}" rel="stylesheet">
</head>
<body class="bg-gray-100">
    <div class="container mx-auto p-4">
        <h1 class="text-2xl font-bold mb-4">Configured Chatbots</h1>
        <a href="{% url 'agent_form' %}" class="bg-blue-500 text-white px-4 py-2 rounded">Add New Agent</a>
        <table class="min-w-full bg-white border border-gray-300 mt-4">
            <thead>
                <tr>
                    <th class="py-2 px-4 border-b">Name</th>
                    <th class="py-2 px-4 border-b">Description</th>
                    <th class="py-2 px-4 border-b">Actions</th>
                </tr>
            </thead>
            <tbody>
                {% for agent in agents %}
                <tr>
                    <td class="py-2 px-4 border-b">{{ agent.name }}</td>
                    <td class="py-2 px-4 border-b">{{ agent.description }}</td>
                    <td class="py-2 px-4 border-b">
                        <a href="{% url 'agent_detail' agent.id %}" class="text-blue-500">View</a>
                        <a href="{% url 'agent_form' agent.id %}" class="text-yellow-500 ml-2">Edit</a>
                        <form action="{% url 'agent_delete' agent.id %}" method="post" class="inline">
                            {% csrf_token %}
                            <button type="submit" class="text-red-500 ml-2">Delete</button>
                        </form>
                    </td>
                </tr>
                {% empty %}
                <tr>
                    <td colspan="3" class="py-2 px-4 text-center">No agents configured.</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
    <script src="{% static 'js/app.js' %}"></script>
</body>
</html>
