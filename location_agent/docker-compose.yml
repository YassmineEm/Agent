services:

  location-agent:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: location_agent
    ports:
      - "8007:8007"
    env_file:
      - .env
    networks:
      - location-net
      - akwa_net   # réseau partagé avec orchestrateur + autres agents
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8007/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

networks:
  location-net:
    driver: bridge
  akwa_net:
    external: true